<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f5f6fa; margin:0; padding:24px; }
        .card { max-width:480px; margin:40px auto; background:#fff; border-radius:10px; padding:24px; box-shadow:0 4px 18px rgba(0,0,0,0.08); }
        h1 { margin:0 0 10px; font-size:24px; }
        p { color:#555; margin:0 0 18px; }
        input[type="email"] { width:100%; padding:11px; border:1px solid #ddd; border-radius:8px; margin-bottom:12px; }
        button { width:100%; background:#3458db; color:#fff; border:0; border-radius:8px; padding:11px; cursor:pointer; }
        a { color:#3458db; text-decoration:none; }
        .msg { margin-bottom:12px; padding:10px; border-radius:8px; font-size:14px; }
        .err { background:#fde7ea; color:#7a1f29; }
        .ok { background:#e8f7ec; color:#1e5e2b; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Forgot Password</h1>
        <p>Enter your account email and we will send a password reset link.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="msg {{ 'ok' if category in ['success','login_success'] else 'err' }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="post" action="{{ url_for('forgot_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="email" name="email" placeholder="Email address" required>
            <button type="submit">Send Reset Link</button>
        </form>
        <p style="margin-top:14px;"><a href="{{ url_for('main') }}">Back to login</a></p>
    </div>
</body>
</html>
