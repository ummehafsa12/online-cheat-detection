<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile - Online CheatBuster</title>
    <link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #f8fafc;
        }
        body {
            background: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 24px 0;
            margin-bottom: 24px;
        }
        .profile-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(102,126,234,0.4);
        }
        .info-label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .info-value {
            font-weight: 700;
            color: #1f2937;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container d-flex align-items-center justify-content-between">
            <div>
                <h2 class="mb-1"><i class='bx bxs-user'></i> Admin Profile</h2>
                <small>Account details and access</small>
            </div>
            <div>
                <a href="{{ url_for('adminStudents') }}" class="btn btn-light mr-2">
                    <i class='bx bxs-group'></i> Students
                </a>
                <a href="{{ url_for('adminLiveMonitoring') }}" class="btn btn-outline-light mr-2">
                    <i class='bx bxs-camera'></i> Live Monitor
                </a>
                <a href="{{ url_for('adminRecordings') }}" class="btn btn-outline-light">
                    <i class='bx bxs-video-recording'></i> Recordings
                </a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card profile-card p-4">
            <div class="d-flex align-items-center">
                <img class="profile-avatar mr-4"
                     src="{{ url_for('static', filename='Profiles/' + admin.profile) if admin.profile else url_for('static', filename='img/avatar.svg') }}"
                     alt="Admin Profile">
                <div>
                    <div class="info-label">Name</div>
                    <div class="info-value">{{ admin.name }}</div>
                    <div class="mt-2 info-label">Email</div>
                    <div class="info-value">{{ admin.email }}</div>
                    <div class="mt-2 info-label">Role</div>
                    <div class="info-value">ADMIN</div>
                </div>
            </div>
            <hr>
            <p class="text-muted mb-0">
                Profile updates are managed by the administrator account settings.
            </p>
        </div>
    </div>
</body>
</html>
