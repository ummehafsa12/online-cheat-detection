<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f5f6fa; margin:0; padding:24px; }
        .card { max-width:520px; margin:40px auto; background:#fff; border-radius:10px; padding:24px; box-shadow:0 4px 18px rgba(0,0,0,0.08); }
        h1 { margin:0 0 10px; font-size:24px; }
        p { color:#555; margin:0 0 18px; }
        input[type="password"] { width:100%; padding:11px; border:1px solid #ddd; border-radius:8px; margin-bottom:12px; }
        button { width:100%; background:#3458db; color:#fff; border:0; border-radius:8px; padding:11px; cursor:pointer; }
        .msg { margin-bottom:12px; padding:10px; border-radius:8px; font-size:14px; background:#fde7ea; color:#7a1f29; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Reset Password</h1>
        <p>Set a new password for your account.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    {% if category in ['error', 'login_error'] %}
                        <div class="msg">{{ message }}</div>
                    {% endif %}
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="post" action="{{ url_for('reset_password', token=token) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="password" name="password" placeholder="New password (min 8 chars)" required>
            <input type="password" name="confirm_password" placeholder="Confirm new password" required>
            <button type="submit">Update Password</button>
        </form>
    </div>
</body>
</html>
